name: Publish package
on:
    push:
        branches:
            - release/latest

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
          contents: write
          id-token: write
        steps:
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
              node-version: '22'
              registry-url: 'https://registry.npmjs.org'

          - run: npm install

          - name: Publish
            run: npx needle-publish-helper publish "." --oidc --version+hash --create-tag --tag latest --webhook "${{ secrets.DISCORD_WEBHOOK }}" --llm-api-key "${{ secrets.LLM_API_KEY }}"
